repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(pyproject\.toml|src/.*\.py|tests/.*\.py)$
      - id: ruff-format
        files: ^(src/.*\.py|tests/.*\.py)$

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
