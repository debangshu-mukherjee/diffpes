repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(pyproject\.toml|src/.*\.py|tests/.*\.py)$
      - id: ruff-format
        files: ^(src/.*\.py|tests/.*\.py)$

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
      - id: loc-badge
        name: loc badge (local count, no CI commits)
        entry: uv run python .github/badges/loc_badge.py
        language: system
        pass_filenames: false
        always_run: true
      - id: requirements-export
        name: requirements.txt export (GitHub dependency graph)
        entry: >
          uv export --frozen --all-extras --no-emit-project --no-hashes
          --quiet --output-file requirements.txt
        language: system
        pass_filenames: false
        always_run: true
