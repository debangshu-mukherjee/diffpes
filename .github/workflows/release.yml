# Publish only immutable version tags through PyPI Trusted Publishing.
name: Publish release to PyPI

"on":
  push:
    tags:
      - "v*"

concurrency:
  group: "pypi-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/diffpes/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify tag matches project version
        shell: bash
        run: |
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "${GITHUB_REF_NAME}" != "v${project_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version ${project_version}."
            exit 1
          fi

      - name: Build source and wheel distributions
        run: uv build --no-sources

      - name: Smoke-test wheel
        run: >-
          uv run --isolated --no-project --with dist/*.whl
          python -c "import diffpes; print(diffpes.__version__)"

      - name: Smoke-test source distribution
        run: >-
          uv run --isolated --no-project --with dist/*.tar.gz
          python -c "import diffpes; print(diffpes.__version__)"

      - name: Publish distributions to PyPI
        run: uv publish --trusted-publishing always dist/*
